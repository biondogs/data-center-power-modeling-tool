# Data Center Capacity & Power Modeling Tool - Docker Compose
# Run: docker-compose up -d
# Stop: docker-compose down
# Rebuild: docker-compose up -d --build

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-center-tool
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:///data/dev.db
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
    driver: local
