# Data Center Capacity & Power Modeling Tool - Docker Compose
# Run: docker-compose up -d
# Stop: docker-compose down
# View logs: docker-compose logs -f

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: data-center-tool
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db
    volumes:
      # Persistent SQLite database storage
      - data:/data
      # Optional: Mount for logs
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
    driver: local
  logs:
    driver: local
